<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard — YUMEI Bakery</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>
  
  <div id="toast-container"></div>

  <!-- LOGIN SECTION -->
  <section id="login-section" class="screen active">
    <div class="login-card">
      <h1 class="logo-font">YUMEI</h1>
      <h2>Admin Portal</h2>
      <p>Secure access restricted to authorized personnel only.</p>
      <button id="btn-login" class="btn btn-primary">Sign In with Google</button>
    </div>
  </section>

  <!-- DASHBOARD SECTION -->
  <section id="dashboard-section" class="screen">
    <nav class="sidebar">
      <div class="sidebar-header">
        <h2 class="logo-font">YUMEI</h2>
        <span>Admin Panel</span>
      </div>
      <div class="sidebar-menu">
        <button class="nav-btn active" data-target="orders">Orders</button>
        <button class="nav-btn" data-target="products">Products</button>
      </div>
      <div class="sidebar-footer">
        <span id="admin-email" class="admin-email"></span>
        <button id="btn-logout" class="btn btn-sm btn-secondary">Logout</button>
      </div>
    </nav>

    <main class="main-content">
      
      <!-- ORDERS VIEW -->
      <div id="view-orders" class="view active">
        <div class="view-header">
          <h2>Order Management</h2>
          <button id="btn-refresh-orders" class="btn btn-secondary">Refresh</button>
        </div>
        <div class="table-container">
          <table class="data-table">
            <thead>
              <tr>
                <th>Order ID</th>
                <th>Date</th>
                <th>Customer</th>
                <th>Total</th>
                <th>Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="orders-table-body">
              <tr><td colspan="6" class="text-center">Loading orders...</td></tr>
            </tbody>
          </table>
        </div>
      </div>

      <!-- PRODUCTS VIEW -->
      <div id="view-products" class="view">
        <div class="view-header">
          <h2>Product Catalog</h2>
          <button id="btn-add-product" class="btn btn-primary">+ Add New Product</button>
        </div>
        <div class="table-container">
          <table class="data-table">
            <thead>
              <tr>
                <th>Image</th>
                <th>Name & Category</th>
                <th>Price</th>
                <th>ID</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="products-table-body">
              <tr><td colspan="5" class="text-center">Loading products...</td></tr>
            </tbody>
          </table>
        </div>
      </div>

    </main>
  </section>

  <!-- PRODUCT MODAL -->
  <div id="product-modal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="modal-title">Add/Edit Product</h3>
        <button class="close-btn" id="btn-close-modal">×</button>
      </div>
      <form id="product-form">
        <input type="hidden" id="prod-original-id">
        <div class="form-row">
          <div class="form-group">
            <label>Product ID</label>
            <input type="text" id="prod-id" class="form-input" required placeholder="e.g. ck5">
          </div>
          <div class="form-group">
            <label>Name</label>
            <input type="text" id="prod-name" class="form-input" required>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Category</label>
            <select id="prod-category" class="form-input" required>
              <option value="cakes">Cakes</option>
              <option value="cheesecakes">Cheesecakes</option>
              <option value="cookies">Cookies</option>
            </select>
          </div>
          <div class="form-group">
            <label>Price (₹)</label>
            <input type="number" id="prod-price" class="form-input" required min="0">
          </div>
        </div>
        <div class="form-group">
          <label>Description</label>
          <textarea id="prod-description" class="form-input" rows="3" required></textarea>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Image URL / Path</label>
            <input type="text" id="prod-image" class="form-input" required placeholder="e.g. assets/images/cake.png">
          </div>
          <div class="form-group">
            <label>Badge (Optional)</label>
            <input type="text" id="prod-badge" class="form-input" placeholder="e.g. Bestseller, New">
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" id="btn-cancel-modal">Cancel</button>
          <button type="submit" class="btn btn-primary" id="btn-save-product">Save Product</button>
        </div>
      </form>
    </div>
  </div>

  <script type="module" src="js/admin.js"></script>
</body>
</html>
